{{- $fullname := include "ror-app.fullname" . -}}
{{- $secretName := printf "%s-secret" $fullname -}}
{{/*
  Resolve SECRET_KEY_BASE:
    1. Explicit value from .Values.secret.SECRET_KEY_BASE, else
    2. Reuse the value already stored in the cluster (stable across upgrades), else
    3. Generate a new random one.
*/}}
{{- $skb := .Values.secret.SECRET_KEY_BASE -}}
{{- if not $skb -}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
  {{- if and $existing $existing.data (index $existing.data "SECRET_KEY_BASE") -}}
    {{- $skb = index $existing.data "SECRET_KEY_BASE" | b64dec -}}
  {{- else -}}
    {{- $skb = randAlphaNum 128 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ror-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  RDS_PASSWORD: {{ required "secret.RDS_PASSWORD is required (e.g. --set secret.RDS_PASSWORD=... from Secrets Manager)" .Values.secret.RDS_PASSWORD | quote }}
  SECRET_KEY_BASE: {{ $skb | quote }}

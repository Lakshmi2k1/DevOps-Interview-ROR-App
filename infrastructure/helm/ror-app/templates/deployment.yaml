apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ror-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ror-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ror-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ror-app.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when the env config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap-env.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "ror-app.selectorLabels" . | nindent 14 }}
      containers:
        - name: rails
          image: "{{ required "image.rails.repository is required" .Values.image.rails.repository }}:{{ .Values.image.rails.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ include "ror-app.fullname" . }}-env
            - secretRef:
                name: {{ include "ror-app.fullname" . }}-secret
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.rails | nindent 12 }}
        - name: nginx
          image: "{{ required "image.nginx.repository is required" .Values.image.nginx.repository }}:{{ .Values.image.nginx.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: web
              containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.nginx | nindent 12 }}
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "ror-app.fullname" . }}-nginx
